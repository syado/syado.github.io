<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <!-- manifest.jsonを呼び出しています -->
    <link rel="manifest" href="./manifest.json">
    <script>
        // service workerが有効なら、service-worker.js を登録します
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').then(function () { console.log('Service Worker Registered'); });
        }
    </script>
    <link rel="stylesheet" href="style_idx.css">

    <title>麻雀カメラ</title>
</head>

<body>
    <!-- 縦画面時に表示 -->
    <h1 class="error">画面を横に傾けてください</h1>

    <!-- 横画面時に表示 -->
    <h1 class="title">麻雀カメラ</h1>
    <form action="web_camera.html" method="POST">
        <button class="btn" type="submit">写真を撮る</button>
    </form>
    <form id="img_form" action="http://52.196.253.153/img_api/post" method="POST" enctype="multipart/form-data">
        <input onchange="img_form_send()" type="file" name="image" accept="image/png, image/jpeg, image/jpg">
    </form>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="api.js"></script>
</body>

</html>
